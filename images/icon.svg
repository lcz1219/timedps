<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- 极简扁平化纯色背景 -->
  <rect width="256" height="256" rx="64" fill="#1E1E2E"/>
  
  <!-- 扁平化折线图 (代表数据和 Token 脉冲) -->
  <path d="M 48 160 L 96 96 L 144 128 L 208 64" fill="none" stroke="#A6E3A1" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 扁平化数据节点 -->
  <circle cx="96" cy="96" r="16" fill="#F9E2AF"/>
  <circle cx="144" cy="128" r="16" fill="#89B4FA"/>
  <circle cx="208" cy="64" r="20" fill="#F38BA8"/>

  <!-- 底部扁平化的支撑线 -->
  <line x1="48" y1="192" x2="208" y2="192" stroke="#45475A" stroke-width="8" stroke-linecap="round"/>
</svg>